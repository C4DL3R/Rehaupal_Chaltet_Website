name: Update Airbnb Rating

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday at 7am UTC
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

jobs:
  update-rating:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch and parse Airbnb rating
        run: |
          python3 << 'PYEOF'
          import json, re, sys, urllib.request

          LISTING_URL = "https://www.airbnb.de/rooms/53041871"
          RATING_FILE = "airbnb-rating.json"

          headers = {
              "User-Agent": (
                  "Mozilla/5.0 (Windows NT 10.0; Win64; x64) "
                  "AppleWebKit/537.36 (KHTML, like Gecko) "
                  "Chrome/124.0.0.0 Safari/537.36"
              ),
              "Accept-Language": "de-DE,de;q=0.9,en;q=0.8",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
          }

          print(f"Fetching {LISTING_URL} ...")
          try:
              req = urllib.request.Request(LISTING_URL, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  html = resp.read().decode("utf-8")
          except Exception as e:
              print(f"Fetch failed: {e} — keeping existing values.")
              sys.exit(0)

          score   = None
          reviews = None

          # Strategy 1: JSON-LD structured data
          ld_score   = re.search(r'"ratingValue"\s*:\s*"?([\d.]+)"?', html)
          ld_reviews = re.search(r'"reviewCount"\s*:\s*"?(\d+)"?', html)
          if ld_score:   score   = float(ld_score.group(1))
          if ld_reviews: reviews = int(ld_reviews.group(1))

          # Strategy 2: Next.js __NEXT_DATA__ blob
          if score is None or reviews is None:
              blob = re.search(
                  r'<script id="__NEXT_DATA__"[^>]*>(.*?)</script>',
                  html, re.DOTALL
              )
              if blob:
                  try:
                      text = blob.group(1)
                      if score is None:
                          m = re.search(r'"avg_rating"\s*:\s*([\d.]+)', text)
                          if m: score = float(m.group(1))
                      if reviews is None:
                          m = re.search(r'"review_count"\s*:\s*(\d+)', text)
                          if m: reviews = int(m.group(1))
                  except Exception as e:
                      print(f"__NEXT_DATA__ parse error: {e}")

          # Strategy 3: generic rating patterns in page source
          if score is None:
              m = re.search(r'"starRating"\s*:\s*([\d.]+)', html)
              if m: score = float(m.group(1))
          if reviews is None:
              m = re.search(r'(\d{2,4})\s*Bewertungen', html)
              if m: reviews = int(m.group(1))

          if score is None or reviews is None:
              print("Could not parse rating from page — keeping existing values.")
              sys.exit(0)

          score   = round(score, 2)
          reviews = int(reviews)

          with open(RATING_FILE) as f:
              current = json.load(f)

          if current.get("score") == score and current.get("reviews") == reviews:
              print(f"No change: {score} ({reviews} reviews)")
              sys.exit(0)

          current["score"]   = score
          current["reviews"] = reviews

          with open(RATING_FILE, "w") as f:
              json.dump(current, f, indent=2)
              f.write("\n")

          print(f"Updated: {score} ({reviews} reviews)")
          PYEOF

      - name: Commit and push if rating changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add airbnb-rating.json
          git diff --staged --quiet && echo "Nothing to commit." || (
            git commit -m "chore: update Airbnb rating" &&
            git push
          )
